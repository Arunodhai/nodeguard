apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodeguard
  namespace: argocd
  # Finalizer ensures ArgoCD cleans up the app's resources on deletion
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # ── Replace with your actual GitHub repo URL ──────────────────────────────
    repoURL: https://github.com/Arunodhai/nodeguard
    targetRevision: HEAD
    path: helm/nodeguard

    helm:
      releaseName: nodeguard
      parameters:
        - name: image.tag
          value: local
        - name: image.pullPolicy
          value: Never
        - name: serviceMonitor.enabled
          value: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: nodeguard

  syncPolicy:
    automated:
      prune: true       # delete resources removed from git
      selfHeal: true    # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
